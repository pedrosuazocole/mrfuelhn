<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular rojo Texaco -->
  <circle cx="200" cy="200" r="190" fill="#ED1C24"/>
  <circle cx="200" cy="200" r="180" fill="white"/>
  <circle cx="200" cy="200" r="170" fill="#ED1C24"/>
  
  <!-- Icono de bomba de gasolina estilizada -->
  <g transform="translate(155, 80)">
    <!-- Cuerpo de la bomba -->
    <rect x="10" y="20" width="70" height="100" rx="8" fill="white"/>
    <rect x="14" y="24" width="62" height="92" rx="6" fill="#ED1C24"/>
    
    <!-- Pantalla digital -->
    <rect x="22" y="38" width="46" height="28" rx="4" fill="white"/>
    <text x="45" y="57" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ED1C24" text-anchor="middle">88.8</text>
    
    <!-- Estrella Texaco -->
    <polygon points="45,76 48,83 56,83 50,88 52,95 45,90 38,95 40,88 34,83 42,83" fill="white"/>
    
    <!-- Manguera -->
    <path d="M 5 50 Q 0 55, 0 60 L 0 100 Q 0 105, 5 105 L 10 105" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="10" cy="105" r="4" fill="white"/>
    
    <!-- Base -->
    <rect x="5" y="120" width="80" height="6" rx="3" fill="white"/>
  </g>
  
  <!-- Texto MR. FUEL -->
  <text x="200" y="280" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">MR. FUEL</text>
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">AUDITORÍAS TEXACO</text>
  
  <!-- Borde exterior blanco -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="white" stroke-width="3"/>
</svg>
